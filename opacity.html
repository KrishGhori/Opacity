<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Opacity Image</title>

<style>

img{
    width:450px;
    height:400px;
    margin:20px;
}

.img1{
    opacity:1;
    transition:opacity 0.5s;
}

.img1:hover{
    opacity:0.3;
}

.img2{
    opacity:0.3;
    transition:opacity 0.5s;
}

.img2:hover{
    opacity:1;
}

</style>

</head>

<body>

<img src="image1.jpg" class="img1" alt="First Image">
<img src="image2.jpg" class="img2" alt="Second Image">

</body>
</html>
